<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rocinante Task Dashboard</title>
    <!--
    SUPABASE SETUP — run this SQL in your Supabase project (SQL Editor):

    create table dashboard_state (
      user_id uuid references auth.users primary key,
      data jsonb,
      updated_at timestamptz default now()
    );
    alter table dashboard_state enable row level security;
    create policy "own data" on dashboard_state
      for all using (auth.uid() = user_id);

    Then: Authentication → Settings → disable "Confirm email"
          Authentication → Users → Add user (your email + password)
    -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #10100e; --card: #171612; --text: #c8bfa8;
            --accent: #c28a3a; --border: #2a2720; --success: #7a9e6e;
            --warning: #c99142; --danger: #b66a5f; --muted: #8f8776;
        }
        *, *::before, *::after { box-sizing: border-box; }
        html, body { height: 100%; margin: 0; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--text);
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; margin: 0; padding: 0;
        }

        /* LOGIN */
        #login-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--bg); display: flex; align-items: center; justify-content: center;
        }
        #login-screen.hidden { display: none; }
        .login-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            padding: 40px 36px; width: 320px; display: flex; flex-direction: column; gap: 12px;
        }
        .login-logo { font-size: 20px; font-weight: 900; color: var(--accent); letter-spacing: 3px; text-align: center; }
        .login-sub  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; text-align: center; margin-bottom: 6px; }
        .login-field {
            background: var(--bg); border: 1px solid var(--border); color: var(--text);
            padding: 10px 14px; border-radius: 8px; font-size: 13px; outline: none;
            font-family: inherit; width: 100%;
        }
        .login-field:focus { border-color: var(--accent); }
        .login-btn {
            background: var(--accent); color: var(--bg); border: none;
            padding: 10px; border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: 800; font-family: inherit; margin-top: 4px;
        }
        .login-btn:hover { opacity: 0.85; }
        .login-btn:disabled { opacity: 0.5; cursor: default; }
        .login-error { color: var(--danger); font-size: 12px; text-align: center; min-height: 16px; }

        /* SYNC DOT */
        .sync-status {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
            border: 1px solid transparent;
            background: transparent; color: var(--muted); border-color: transparent;
            letter-spacing: 0.03em; user-select: none; opacity: 0;
        }
        .sync-status::before {
            content: ''; width: 6px; height: 6px; border-radius: 50%;
            background: var(--muted); flex-shrink: 0;
        }
        .sync-status.syncing { opacity: 1; background: rgba(234,179,8,0.12); color: #ca8a04; border-color: #ca8a04; }
        .sync-status.syncing::before { background: #ca8a04; }
        .sync-status.synced  { opacity: 1; background: rgba(34,197,94,0.12); color: #16a34a; border-color: #16a34a; }
        .sync-status.synced::before  { background: #16a34a; }
        .sync-status.error   { opacity: 1; background: rgba(239,68,68,0.12); color: #dc2626; border-color: #dc2626; }
        .sync-status.error::before   { background: #dc2626; }

        /* MAIN */
        .main-content {
            flex: 1; min-height: 0;
            display: flex; flex-direction: column; gap: 10px;
            padding: 14px 18px 68px; overflow: hidden;
        }

        /* FILTER BAR */
        .kanban-filter {
            display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
            padding: 8px 14px; background: var(--card); border-radius: 10px;
            border: 1px solid var(--border); flex-shrink: 0;
        }
        .filter-label {
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1.2px; color: var(--muted); margin-right: 2px;
        }
        .filter-btn {
            padding: 5px 16px; border-radius: 20px; cursor: pointer;
            font-size: 11px; font-weight: 700; font-family: inherit;
            letter-spacing: 0.5px; background: transparent;
            color: var(--muted); border: 1.5px solid var(--border);
        }
        .filter-btn:hover:not(.active) { border-color: var(--muted); color: var(--text); }
        .filter-btn.active { background: var(--muted); color: var(--bg); border-color: var(--muted); }

        /* ADD TASK BAR */
        .kanban-add-bar {
            background: var(--card); border-radius: 10px;
            border: 1px solid var(--border); flex-shrink: 0; overflow: hidden;
        }
        .kanban-add-bar.focused { border-color: var(--accent); }
        .kanban-add-wrap { display: flex; flex-direction: column; }
        .kanban-input {
            width: 100%; background: transparent; border: none;
            color: var(--text); padding: 11px 16px;
            font-size: 15px; outline: none; font-family: inherit;
        }
        .tag-strip {
            border-top: 1px solid var(--border);
            padding: 8px 12px 10px;
            display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
        }
        .tag-strip.hidden { display: none; }
        .tag-pill {
            padding: 4px 13px; border-radius: 20px; cursor: pointer;
            font-size: 10px; font-weight: 800; letter-spacing: 0.8px; text-transform: uppercase;
            background: transparent; border: 1px solid var(--border); color: var(--muted);
            user-select: none; font-family: inherit;
        }
        .tag-pill.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
        .tag-strip-hint {
            font-size: 10px; color: var(--muted); opacity: 0.5; margin-left: auto;
            font-style: italic; letter-spacing: 0.3px;
        }

        /* CONTENT AREA (kanban + calendar side by side) */
        .content-area {
            display: flex; flex-direction: row; gap: 14px;
            flex: 1; min-height: 0; overflow: hidden;
        }
        .kanban-area {
            display: flex; flex-direction: column; gap: 10px;
            flex: 1; min-height: 0; overflow: hidden;
        }

        /* CALENDAR SIDEBAR */
        .calendar-sidebar {
            width: 256px; flex-shrink: 0;
            display: flex; flex-direction: column; gap: 10px;
            overflow-y: auto; padding-right: 2px;
        }
        .calendar-sidebar::-webkit-scrollbar { width: 3px; }
        .calendar-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .cal-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 14px; flex-shrink: 0;
        }
        .cal-card-title {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.8px; color: var(--accent); margin-bottom: 8px;
        }
        .cal-date {
            font-size: 42px; font-weight: 800; line-height: 1;
            color: var(--text); margin-bottom: 4px;
        }
        .cal-weekday {
            font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent);
        }
        .cal-month {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 2px;
        }
        .cal-head {
            font-size: 9px; color: var(--muted); text-align: center;
            text-transform: uppercase; letter-spacing: 0.6px; padding-bottom: 2px;
        }
        .cal-day {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
            border-radius: 6px; border: 1px solid transparent; font-size: 11px; color: var(--text);
        }
        .cal-day.muted { color: var(--muted); opacity: 0.4; }
        .cal-day.today { border-color: var(--accent); background: rgba(56,189,248,0.12); color: var(--accent); font-weight: 800; }
        .cal-week-strip {
            display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px;
        }
        .cal-week-pill {
            padding: 6px 3px; border-radius: 7px; text-align: center;
            border: 1px solid var(--border);
        }
        .cal-week-pill b {
            display: block; font-size: 9px; color: var(--muted); margin-bottom: 3px; letter-spacing: 0.5px; font-weight: 700;
        }
        .cal-week-pill span { color: var(--text); font-size: 11px; font-weight: 600; }
        .cal-week-pill.today { border-color: var(--accent); }

        /* KANBAN BOARD */
        .kanban-board {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
            flex: 1; min-height: 0; overflow: hidden;
        }
        .kanban-col {
            display: flex; flex-direction: column; overflow: hidden;
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 14px 14px 10px;
        }
        .kanban-col.drag-over { border-color: var(--accent); background: rgba(56,189,248,0.04); }
        .kanban-col-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .kanban-col-title {
            font-size: 13px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1.5px; color: var(--accent);
        }
        .col-count {
            font-size: 11px; font-weight: 700; background: var(--border);
            color: var(--muted); padding: 2px 9px; border-radius: 10px;
        }
        .kanban-col-body {
            overflow-y: auto; display: flex; flex-direction: column; gap: 4px;
            flex: 1; padding-right: 2px;
        }
        .kanban-col-body::-webkit-scrollbar { width: 3px; }
        .kanban-col-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* KANBAN CARD */
        .kanban-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 8px;
            padding: 7px 10px 6px; cursor: grab;
            user-select: none; display: flex; flex-direction: column; gap: 3px;
        }
        .kanban-card:hover { border-color: var(--muted); }
        .kanban-card.dragging { opacity: 0.4; transform: scale(0.97); cursor: grabbing; }
        .kanban-card-header { display: flex; gap: 8px; align-items: flex-start; }
        .kanban-card-text {
            flex: 1; font-size: 13px; line-height: 1.35; color: var(--text); font-weight: 500;
        }
        .kanban-card.done .kanban-card-text { text-decoration: line-through; opacity: 0.45; }
        .kanban-card-tags {
            flex-shrink: 0; display: flex; flex-direction: column; gap: 3px; align-items: flex-end;
        }
        .kanban-tag {
            font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.6px;
            padding: 2px 6px; border-radius: 6px; white-space: nowrap;
            color: var(--muted); border: 1px solid var(--border); background: transparent;
        }
        .kanban-card-actions {
            display: flex; gap: 2px; opacity: 0; justify-content: flex-end;
        }
        .kanban-card:hover .kanban-card-actions { opacity: 1; }
        .card-edit-btn, .card-del-btn, .card-done-btn {
            background: none; border: none; cursor: pointer; padding: 2px 5px;
            font-family: inherit;
        }
        .card-edit-btn {
            font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.8px; color: var(--muted);
        }
        .card-del-btn  { font-size: 18px; line-height: 1; color: var(--muted); }
        .card-done-btn { font-size: 15px; line-height: 1; color: var(--muted); }
        .card-edit-btn:hover { color: var(--accent); }
        .card-del-btn:hover  { color: var(--danger); }
        .card-done-btn:hover { color: var(--success); }
        .kanban-empty {
            padding: 24px 14px; border: 1px dashed var(--border); border-radius: 10px;
            color: var(--muted); font-size: 14px; text-align: center;
        }

        /* EDIT MODAL */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 500;
            background: rgba(0,0,0,0.65); display: flex;
            align-items: center; justify-content: center;
        }
        .modal-overlay.hidden { display: none; }
        .modal-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 28px 28px 24px;
            width: 460px; max-width: calc(100vw - 32px);
            display: flex; flex-direction: column; gap: 20px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }
        .modal-title {
            font-size: 13px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1.4px; color: var(--accent);
        }
        .modal-textarea {
            background: var(--bg); border: 1px solid var(--border);
            color: var(--text); padding: 12px 14px; border-radius: 8px;
            font-size: 15px; font-family: inherit; resize: vertical;
            min-height: 90px; outline: none; line-height: 1.55;
            width: 100%;
        }
        .modal-textarea:focus { border-color: var(--accent); }
        .modal-section-label {
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; color: var(--muted); margin-bottom: 10px;
        }
        .modal-checkboxes { display: flex; flex-direction: column; gap: 12px; }
        .modal-check-row {
            display: flex; align-items: center; gap: 12px;
            cursor: pointer; font-size: 15px; color: var(--text); user-select: none;
        }
        .modal-check-row input[type="checkbox"] {
            width: 17px; height: 17px; accent-color: var(--accent);
            cursor: pointer; flex-shrink: 0;
        }
        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        .modal-save-btn {
            background: var(--accent); color: var(--bg); border: none;
            padding: 10px 24px; border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: 800; font-family: inherit;
        }
        .modal-save-btn:hover { opacity: 0.85; }
        .modal-cancel-btn {
            background: transparent; color: var(--muted); border: 1px solid var(--border);
            padding: 10px 18px; border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: 600; font-family: inherit;
        }
        .modal-cancel-btn:hover { border-color: var(--muted); color: var(--text); }
        body.light .modal-textarea { background: #f8fafc; }

        /* DAILY CHECKLIST SIDEBAR */
        .checklist-sidebar {
            width: 256px; flex-shrink: 0;
            display: flex; flex-direction: column; gap: 10px;
            overflow-y: auto;
        }
        .checklist-sidebar::-webkit-scrollbar { width: 3px; }
        .checklist-sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        .cl-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 12px 14px;
            display: flex; flex-direction: column; gap: 12px; flex-shrink: 0;
        }
        .cl-header {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 10px; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.8px; color: var(--accent);
        }
        .cl-progress { color: var(--muted); font-size: 11px; font-weight: 700; }
        .cl-items { display: flex; flex-direction: column; gap: 9px; }
        .cl-item {
            display: flex; align-items: flex-start; gap: 10px; cursor: pointer;
            font-size: 14px; color: var(--text); line-height: 1.4; user-select: none;
        }
        .cl-item input[type="checkbox"] {
            width: 15px; height: 15px; margin-top: 2px;
            accent-color: var(--muted); cursor: pointer; flex-shrink: 0;
            opacity: 0.5;
        }
        .cl-item.done span { text-decoration: line-through; opacity: 0.38; }
        .cl-divider { border: none; border-top: 1px solid var(--border); margin: 0; }
        .cl-add-row { display: flex; gap: 6px; }
        .cl-input {
            flex: 1; background: var(--bg); border: 1px solid var(--border);
            color: var(--text); padding: 6px 10px; border-radius: 7px;
            font-size: 12px; outline: none; font-family: inherit;
        }
        .cl-input:focus { border-color: var(--accent); }
        .cl-add-btn {
            background: var(--border); color: var(--text); border: none;
            width: 30px; border-radius: 7px; cursor: pointer;
            font-size: 18px; line-height: 1; font-family: inherit;
        }
        .cl-add-btn:hover { background: var(--accent); color: var(--bg); }
        body.light .cl-card  { background: #f8fafc; }
        body.light .cl-input { background: #fff; }

        /* FOOTER */
        .footer-tools {
            position: fixed; bottom: 16px; left: 18px; right: 18px;
            display: flex; justify-content: space-between; align-items: center; pointer-events: none;
        }
        .btn-group { display: flex; gap: 8px; pointer-events: auto; align-items: center; }
        button.fbtn, .file-label {
            background: var(--card); color: var(--text); border: 1px solid var(--border);
            padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: 600;
            font-family: inherit;
        }
        button.fbtn:hover, .file-label:hover { background: var(--border); border-color: var(--accent); }
        .btn-danger { background: #450a0a; border-color: #991b1b; }
        .btn-danger:hover { background: var(--danger); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* LIGHT MODE */
        body.light {
            --bg: #f1f5f9; --card: #ffffff; --text: #1a1a1a;
            --accent: #0284c7; --border: #e2e8f0; --success: #16a34a;
            --warning: #b45309; --danger: #dc2626; --muted: #64748b;
        }
        body.light .kanban-filter,
        body.light .kanban-add-bar { background: #e2e8f0; }
        body.light .kanban-input   { background: #f8fafc; color: #1a1a1a; }
        body.light .kanban-card    { background: #f8fafc; }
        body.light .cal-card       { background: #f8fafc; }
        body.light .kanban-col     { background: #f1f5f9; }
        body.light .kanban-col-title { color: var(--accent); }
        body.light .kanban-card-text { color: #1a1a1a; }
        body.light .tag-pill       { color: #64748b; }
        body.light .tag-pill.active,
        body.light .filter-btn.active { color: #ffffff; }
        body.light .kanban-add-btn,
        body.light .modal-save-btn { color: #ffffff; }
        body.light .cl-add-btn:hover { color: #ffffff; }

        body.light button.fbtn, body.light .file-label { background: #e2e8f0; color: #1a1a1a; border-color: #cbd5e1; }
        body.light button.fbtn:hover, body.light .file-label:hover { background: #cbd5e1; }
        body.light .btn-danger { background: #fee2e2; border-color: #fca5a5; color: var(--danger); }
        body.light .btn-danger:hover { background: var(--danger); color: white; }
        body.light ::-webkit-scrollbar-thumb { background: #cbd5e1; }
        body.light .login-card  { box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        body.light .login-field { background: #f8fafc; }

        @media (max-width: 1200px) {
            .calendar-sidebar, .checklist-sidebar { width: 210px; }
        }
        @media (max-width: 900px) {
            .content-area { flex-direction: column; overflow: visible; height: auto; }
            .kanban-area  { overflow: visible; min-height: 0; }
            .calendar-sidebar, .checklist-sidebar { width: 100%; height: auto; overflow: visible; flex-direction: row; flex-wrap: wrap; }
            .cal-card, .cl-card { flex: 1 1 200px; }
        }
        @media (max-width: 820px) {
            html, body { height: auto; min-height: 100%; overflow: auto; }
            .main-content { padding: 12px 12px 20px; overflow: visible; height: auto; }
            .kanban-board { grid-template-columns: 1fr; height: auto; overflow: visible; }
            .kanban-col { overflow: visible; }
            .kanban-col-body { overflow: visible; }
            .footer-tools { position: static; margin-top: 10px; flex-direction: column; align-items: stretch; gap: 8px; pointer-events: auto; }
            .btn-group { flex-wrap: wrap; }
        }
        @media (max-width: 520px) {
            .login-card { width: calc(100vw - 24px); padding: 28px 20px; }
            .kanban-add-bar { flex-direction: column; align-items: stretch; }
            .kanban-input { min-width: 0; font-size: 14px; }
            .kanban-add-btn { width: 100%; }
            .kanban-card-text { font-size: 15px; }
            .card-edit-btn, .card-del-btn, .card-done-btn { opacity: 1; }
        }
    </style>
</head>
<body>

<!-- EDIT MODAL -->
<div class="modal-overlay hidden" id="edit-modal" onclick="if(event.target===this) closeModal()">
    <div class="modal-card">
        <div class="modal-title">Edit Task</div>
        <textarea class="modal-textarea" id="modal-text" rows="3"
            onkeydown="if(event.key==='Enter'&&(event.metaKey||event.ctrlKey)) saveModal()"></textarea>
        <div>
            <div class="modal-section-label">Categories</div>
            <div class="modal-checkboxes" id="modal-checkboxes"></div>
        </div>
        <div class="modal-actions">
            <button class="modal-cancel-btn" onclick="closeModal()">Cancel</button>
            <button class="modal-save-btn" onclick="saveModal()">Save</button>
        </div>
    </div>
</div>

<!-- LOGIN SCREEN -->
<div id="login-screen">
    <div class="login-card">
        <div class="login-logo">ROCINANTE</div>
        <div class="login-sub">Task Dashboard</div>
        <input class="login-field" id="login-email" type="email" placeholder="Email" autocomplete="username">
        <input class="login-field" id="login-pass" type="password" placeholder="Password" autocomplete="current-password"
            onkeydown="if(event.key==='Enter') doLogin()">
        <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In</button>
        <div class="login-error" id="login-error"></div>
    </div>
</div>

<!-- APP -->
<div class="main-content">


<div class="content-area">

<!-- DAILY CHECKLIST -->
<div class="checklist-sidebar" id="checklist-sidebar"></div>

<!-- KANBAN AREA -->
<div class="kanban-area">

<!-- FILTER BAR -->
<div class="kanban-filter">
    <span class="filter-label">Filter</span>
    <button class="filter-btn active" data-tag="all"         onclick="toggleFilter('all')">All</button>
    <button class="filter-btn"        data-tag="rocinante"   onclick="toggleFilter('rocinante')">Rocinante</button>
    <button class="filter-btn"        data-tag="tree"        onclick="toggleFilter('tree')">Tree Web Design</button>
    <button class="filter-btn"        data-tag="treeservice" onclick="toggleFilter('treeservice')">Tree Service News</button>

<script>
// ── SUPABASE CONFIG ───────────────────────────────────────────
const SUPABASE_URL      = 'https://qksmczwjezamzbtmbrdo.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_05WMnG-0dhFX0zbQP3ph-Q_GVT7RewU';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── AUTH ──────────────────────────────────────────────────────
let currentUser = null;
let currentToken = null;
function showLogin() { document.getElementById('login-screen').classList.remove('hidden'); }
function hideLogin() { document.getElementById('login-screen').classList.add('hidden'); }

async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-pass').value;
    const btn   = document.getElementById('login-btn');
    const err   = document.getElementById('login-error');
    if (!email || !pass) { err.textContent = 'Email and password required.'; return; }
    btn.disabled = true; btn.textContent = 'Signing in…'; err.textContent = '';
    try {
        const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('Request timed out — check your connection')), 12000));
        const { error } = await Promise.race([db.auth.signInWithPassword({ email, password: pass }), timeout]);
        if (error) { err.textContent = error.message; btn.disabled = false; btn.textContent = 'Sign In'; }
    } catch(e) {
        err.textContent = e.message || 'Sign-in failed';
        btn.disabled = false; btn.textContent = 'Sign In';
    }
}

function doLogout() {
    currentUser = null; currentToken = null;
    db.auth.signOut();
    showLogin();
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'Sign In';
    document.getElementById('login-pass').value = '';
}

db.auth.onAuthStateChange(async (event, session) => {
    if ((event === 'SIGNED_IN' || event === 'TOKEN_REFRESHED') && session) {
        currentUser = session.user;
        currentToken = session.access_token;
        if (event === 'SIGNED_IN' && !appReady) {
            try {
                await initApp();
            } catch(e) {
                appReady = false;
                const err = document.getElementById('login-error');
                if (err) err.textContent = 'Load error: ' + (e.message || e);
                document.getElementById('login-btn').disabled = false;
                document.getElementById('login-btn').textContent = 'Sign In';
                showLogin();
            }
        }
    } else if (event === 'SIGNED_OUT') {
        currentUser = null; currentToken = null; appReady = false; dataLoaded = false;
        showLogin();
        document.getElementById('login-btn').disabled = false;
        document.getElementById('login-btn').textContent = 'Sign In';
        document.getElementById('login-pass').value = '';
    }
});

let appReady   = false;
let dataLoaded = false;

async function initApp() {
    appReady = true;
    hideLogin();
    renderTagPicker();
    setupColumnDropzones();
    renderCalendarWidget();
    loadChecklist();
    renderChecklist();
    await loadData();
    dataLoaded = true;
    renderKanban();
}

// ── TAGS & DATA MODEL ─────────────────────────────────────────
const TAGS = {
    rocinante:   { label: 'Rocinante' },
    tree:        { label: 'Tree Web Design' },
    treeservice: { label: 'Tree Service News' },
    whitelabel:  { label: 'White Label' },
    personal:    { label: 'Personal' }
};
const TAG_KEYS = Object.keys(TAGS);
const COLUMNS  = ['todo', 'inprogress', 'lowpriority'];

let tasks  = [];
let nextId = 1;
let draggedTaskId = null;
let activeFilters = new Set();

function starterTasks() {
    return [
        { id: 1, text: 'Tighten Rocinante homepage headline',  tags: ['rocinante'],   status: 'todo' },
        { id: 2, text: "Draft this week's client proof post",  tags: ['rocinante'],   status: 'todo' },
        { id: 3, text: 'Finish Tree Web Design revision queue', tags: ['tree'],        status: 'inprogress' },
        { id: 4, text: 'Send progress update to active client', tags: ['tree'],        status: 'todo' },
        { id: 5, text: 'Schedule three short-form posts',       tags: ['treeservice'], status: 'todo' },
        { id: 6, text: 'Schedule personal appointment',         tags: ['personal'],    status: 'todo' }
    ];
}

// ── FILTER ────────────────────────────────────────────────────
function toggleFilter(tag) {
    if (tag === 'all') {
        activeFilters.clear();
    } else {
        if (activeFilters.has(tag)) activeFilters.delete(tag);
        else activeFilters.add(tag);
    }
    document.querySelectorAll('.filter-btn').forEach(btn => {
        const t = btn.dataset.tag;
        btn.classList.toggle('active', t === 'all' ? activeFilters.size === 0 : activeFilters.has(t));
    });
    renderKanban();
}

// ── TAG PICKER ────────────────────────────────────────────────
function renderTagPicker() {
    const strip = document.getElementById('tag-dropdown');
    strip.innerHTML = '';
    strip.addEventListener('mousedown', e => e.preventDefault());
    TAG_KEYS.forEach(key => {
        const pill = document.createElement('button');
        pill.type = 'button';
        pill.className = 'tag-pill';
        pill.dataset.tag = key;
        pill.textContent = TAGS[key].label;
        pill.onclick = () => pill.classList.toggle('active');
        strip.appendChild(pill);
    });
    const hint = document.createElement('span');
    hint.className = 'tag-strip-hint';
    hint.textContent = 'Enter to add';
    strip.appendChild(hint);
}

function showTagDropdown() {
    document.getElementById('tag-dropdown').classList.remove('hidden');
    document.getElementById('kanban-add-bar').classList.add('focused');
}

function hideTagDropdown() {
    document.getElementById('tag-dropdown').classList.add('hidden');
    document.getElementById('kanban-add-bar').classList.remove('focused');
}

// ── ADD TASK ──────────────────────────────────────────────────
function submitKanbanTask() {
    const input = document.getElementById('kanban-input');
    const text  = input.value.trim();
    if (!text) return;
    const selectedTags = [...document.querySelectorAll('.tag-pill.active')].map(p => p.dataset.tag);
    tasks.push({ id: nextId++, text, tags: selectedTags, status: 'todo' });
    input.value = '';
    document.querySelectorAll('.tag-pill').forEach(p => p.classList.remove('active'));
    hideTagDropdown();
    renderKanban();
    save();
}

// ── TASK ACTIONS ──────────────────────────────────────────────
let editingTaskId = null;

function editTask(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    editingTaskId = id;
    document.getElementById('modal-text').value = task.text;
    const checksEl = document.getElementById('modal-checkboxes');
    checksEl.innerHTML = '';
    TAG_KEYS.forEach(key => {
        const label = document.createElement('label');
        label.className = 'modal-check-row';
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.value = key;
        cb.checked = (task.tags || []).includes(key);
        label.append(cb, document.createTextNode(TAGS[key].label));
        checksEl.appendChild(label);
    });
    document.getElementById('edit-modal').classList.remove('hidden');
    document.getElementById('modal-text').focus();
}

function closeModal() {
    editingTaskId = null;
    document.getElementById('edit-modal').classList.add('hidden');
}

function saveModal() {
    const task = tasks.find(t => t.id === editingTaskId);
    if (!task) { closeModal(); return; }
    const text = document.getElementById('modal-text').value.trim();
    if (!text) return;
    task.text = text;
    task.tags = [...document.querySelectorAll('#modal-checkboxes input:checked')].map(cb => cb.value);
    closeModal();
    renderKanban();
    save();
}

function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    renderKanban();
    save();
}

function markDone(id) {
    const task = tasks.find(t => t.id === id);
    if (task) { task.status = 'done'; renderKanban(); save(); }
}

// ── KANBAN RENDER ─────────────────────────────────────────────
function makeKanbanCard(task) {
    const card = document.createElement('div');
    card.className = 'kanban-card' + (task.status === 'done' ? ' done' : '');
    card.draggable = true;
    card.dataset.id = task.id;

    const header = document.createElement('div');
    header.className = 'kanban-card-header';

    const text = document.createElement('div');
    text.className = 'kanban-card-text';
    text.textContent = task.text;
    text.addEventListener('dblclick', () => editTask(task.id));

    const tagRow = document.createElement('div');
    tagRow.className = 'kanban-card-tags';
    (task.tags || []).forEach(key => {
        const cfg = TAGS[key];
        if (!cfg) return;
        const chip = document.createElement('span');
        chip.className = 'kanban-tag';
        chip.textContent = cfg.label;
        tagRow.appendChild(chip);
    });

    header.append(text, tagRow);

    const actions = document.createElement('div');
    actions.className = 'kanban-card-actions';
    const doneBtn = document.createElement('button');
    doneBtn.className = 'card-done-btn';
    doneBtn.textContent = '✓';
    doneBtn.title = 'Mark done';
    doneBtn.onclick = () => markDone(task.id);
    const editBtn = document.createElement('button');
    editBtn.className = 'card-edit-btn';
    editBtn.textContent = 'Edit';
    editBtn.onclick = () => editTask(task.id);
    const delBtn = document.createElement('button');
    delBtn.className = 'card-del-btn';
    delBtn.textContent = '×';
    delBtn.onclick = () => deleteTask(task.id);
    actions.append(doneBtn, editBtn, delBtn);

    card.append(header, actions);

    card.addEventListener('dragstart', e => {
        draggedTaskId = task.id;
        card.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', () => {
        draggedTaskId = null;
        card.classList.remove('dragging');
        document.querySelectorAll('.kanban-col.drag-over').forEach(c => c.classList.remove('drag-over'));
    });

    return card;
}

function renderKanban() {
    const filtered = activeFilters.size === 0
        ? tasks
        : tasks.filter(t => (t.tags || []).some(tag => activeFilters.has(tag)));

    COLUMNS.forEach(status => {
        const body     = document.getElementById('body-' + status);
        const colTasks = filtered.filter(t => t.status === status);
        document.getElementById('count-' + status).textContent = colTasks.length;
        body.innerHTML = '';
        if (!colTasks.length) {
            const empty = document.createElement('div');
            empty.className = 'kanban-empty';
            empty.textContent = 'No tasks here.';
            body.appendChild(empty);
            return;
        }
        colTasks.forEach(task => body.appendChild(makeKanbanCard(task)));
    });
}

// ── DAILY CHECKLIST ───────────────────────────────────────────
const CHECKLIST_DEFAULTS = [
    'Load / unload the dishes',
    'Check mail',
    'Make 20 calls'
];

let checklistData = { items: [...CHECKLIST_DEFAULTS], date: '', checked: [] };

function todayStr() { return new Date().toISOString().slice(0, 10); }

function loadChecklist() {
    const raw = localStorage.getItem('rocinante_checklist');
    if (raw) { try { checklistData = JSON.parse(raw); } catch(e) {} }
    if (!Array.isArray(checklistData.items) || checklistData.items.length === 0)
        checklistData.items = [...CHECKLIST_DEFAULTS];
    if (checklistData.date !== todayStr()) {
        checklistData.date = todayStr();
        checklistData.checked = [];
        saveChecklist();
    }
}

function saveChecklist() {
    localStorage.setItem('rocinante_checklist', JSON.stringify(checklistData));
}

function toggleChecklistItem(idx) {
    const i = checklistData.checked.indexOf(idx);
    if (i === -1) checklistData.checked.push(idx);
    else checklistData.checked.splice(i, 1);
    saveChecklist();
    renderChecklist();
}

function addChecklistItem() {
    const input = document.getElementById('cl-input');
    const text = input.value.trim();
    if (!text) return;
    checklistData.items.push(text);
    input.value = '';
    saveChecklist();
    renderChecklist();
}

function renderChecklist() {
    const sidebar = document.getElementById('checklist-sidebar');
    const checked = new Set(checklistData.checked);
    const total = checklistData.items.length;
    const done  = checked.size;

    sidebar.innerHTML = '';
    const card = document.createElement('div');
    card.className = 'cl-card';

    const header = document.createElement('div');
    header.className = 'cl-header';
    header.innerHTML = `<span>Daily Checklist</span><span class="cl-progress">${done}/${total}</span>`;

    const itemsEl = document.createElement('div');
    itemsEl.className = 'cl-items';
    checklistData.items.forEach((item, idx) => {
        const label = document.createElement('label');
        label.className = 'cl-item' + (checked.has(idx) ? ' done' : '');
        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = checked.has(idx);
        cb.onchange = () => toggleChecklistItem(idx);
        const span = document.createElement('span');
        span.textContent = item;
        label.append(cb, span);
        itemsEl.appendChild(label);
    });

    const divider = document.createElement('hr');
    divider.className = 'cl-divider';

    const addRow = document.createElement('div');
    addRow.className = 'cl-add-row';
    addRow.innerHTML = `
        <input class="cl-input" id="cl-input" type="text" placeholder="Add item…"
            onkeydown="if(event.key==='Enter') addChecklistItem()">
        <button class="cl-add-btn" onclick="addChecklistItem()">+</button>
    `;

    card.append(header, itemsEl, divider, addRow);
    sidebar.appendChild(card);
}

// ── CALENDAR ──────────────────────────────────────────────────
function renderCalendarWidget() {
    const now = new Date();
    const monthLabel   = now.toLocaleDateString(undefined, { month: 'long', year: 'numeric' });
    const weekdayLabel = now.toLocaleDateString(undefined, { weekday: 'long' });
    const first = new Date(now.getFullYear(), now.getMonth(), 1);
    const start = new Date(first);
    start.setDate(first.getDate() - first.getDay());
    const days = [];
    for (let i = 0; i < 35; i++) {
        const d = new Date(start);
        d.setDate(start.getDate() + i);
        const muted = d.getMonth() !== now.getMonth();
        const today = d.toDateString() === now.toDateString();
        days.push(`<div class="cal-day${muted ? ' muted' : ''}${today ? ' today' : ''}">${d.getDate()}</div>`);
    }
    const weekStart = new Date(now);
    weekStart.setDate(now.getDate() - now.getDay());
    const weekDays = [];
    for (let i = 0; i < 7; i++) {
        const d = new Date(weekStart);
        d.setDate(weekStart.getDate() + i);
        const today = d.toDateString() === now.toDateString();
        weekDays.push(`<div class="cal-week-pill${today ? ' today' : ''}">
            <b>${d.toLocaleDateString(undefined, { weekday: 'short' })}</b>
            <span>${d.getDate()}</span>
        </div>`);
    }
    document.getElementById('calendar-sidebar').innerHTML = `
        <div class="cal-card">
            <div class="cal-card-title"><span>Today</span><span>${monthLabel}</span></div>
            <div class="cal-date">${now.getDate()}</div>
            <div class="cal-weekday">${weekdayLabel}</div>
        </div>
        <div class="cal-card">
            <div class="cal-card-title"><span>This Week</span><span>Day ${now.getDay() + 1}</span></div>
            <div class="cal-week-strip">${weekDays.join('')}</div>
        </div>
        <div class="cal-card">
            <div class="cal-card-title"><span>Month View</span><span>${monthLabel}</span></div>
            <div class="cal-month">
                <div class="cal-head">Sun</div><div class="cal-head">Mon</div><div class="cal-head">Tue</div>
                <div class="cal-head">Wed</div><div class="cal-head">Thu</div><div class="cal-head">Fri</div>
                <div class="cal-head">Sat</div>
                ${days.join('')}
            </div>
        </div>
    `;
}

// ── COLUMN DROP ZONES ─────────────────────────────────────────
function setupColumnDropzones() {
    COLUMNS.forEach(status => {
        const col = document.getElementById('col-' + status);
        col.addEventListener('dragover', e => {
            if (!draggedTaskId) return;
            e.preventDefault();
            col.classList.add('drag-over');
        });
        col.addEventListener('dragleave', e => {
            if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over');
        });
        col.addEventListener('drop', e => {
            if (!draggedTaskId) return;
            e.preventDefault();
            col.classList.remove('drag-over');
            const task = tasks.find(t => t.id === draggedTaskId);
            if (task && task.status !== status) {
                task.status = status;
                renderKanban();
            
                save();
            }
        });
    });
}

// ── PERSISTENCE ───────────────────────────────────────────────
function gatherData() {
    return { v: '5.0', savedAt: Date.now(), tasks, nextId };
}

function applyData(data) {
    if (Array.isArray(data.tasks)) {
        tasks = data.tasks;
    } else if (data.taskLists) {
        // Migrate from v4 tab-based format
        const tagMap = { rocinante: 'rocinante', tree: 'tree', social: 'treeservice', personal: 'personal' };
        tasks = [];
        for (const [cat, items] of Object.entries(data.taskLists)) {
            const tag = tagMap[cat];
            if (!tag || !Array.isArray(items)) continue;
            for (const t of items) {
                tasks.push({ id: t.id, text: t.text, tags: [tag], status: t.done ? 'done' : 'todo' });
            }
        }
    } else {
        tasks = starterTasks();
    }
    if (!Array.isArray(tasks)) tasks = starterTasks();
    if (data.nextId) {
        nextId = data.nextId;
    } else {
        nextId = Math.max(0, ...tasks.map(t => t.id || 0)) + 1;
    }
    renderKanban();

}

let cloudSaveTimer;
function setSyncDot(state) {
    const dot = document.getElementById('sync-dot');
    const labels = { syncing: 'Saving…', synced: 'Saved', error: 'Save Failed' };
    dot.className = 'sync-status' + (state ? ' ' + state : '');
    dot.textContent = labels[state] || 'Idle';
}

function save() {
    if (!dataLoaded) return;
    const data = gatherData();
    localStorage.setItem('rocinante_v5_0', JSON.stringify(data));
    setSyncDot('syncing');
    clearTimeout(cloudSaveTimer);
    cloudSaveTimer = setTimeout(() => saveToCloud(data), 800);
}

async function saveToCloud(data) {
    if (!currentUser || !currentToken) { setSyncDot(''); return; }
    if (location.protocol === 'file:') { setSyncDot('synced'); setTimeout(() => setSyncDot(''), 2000); return; }
    try {
        const resp = await fetch(`${SUPABASE_URL}/rest/v1/dashboard_state`, {
            method: 'POST',
            headers: {
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${currentToken}`,
                'Content-Type': 'application/json',
                'Prefer': 'resolution=merge-duplicates,return=minimal'
            },
            body: JSON.stringify({ user_id: currentUser.id, data, updated_at: new Date().toISOString() }),
            signal: AbortSignal.timeout(8000)
        });
        if (resp.ok) { setSyncDot('synced'); setTimeout(() => setSyncDot(''), 3000); }
        else { console.error('Save failed:', resp.status, await resp.text()); setSyncDot('error'); }
    } catch(e) { console.error('Save exception:', e.message); setSyncDot('error'); }
}

async function loadData() {
    let cloudData = null;
    if (currentUser && currentToken && location.protocol !== 'file:') {
        try {
            const resp = await fetch(
                `${SUPABASE_URL}/rest/v1/dashboard_state?select=data&user_id=eq.${currentUser.id}`,
                { headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${currentToken}` },
                  signal: AbortSignal.timeout(8000) }
            );
            if (resp.ok) {
                const rows = await resp.json();
                if (rows.length > 0 && rows[0].data) cloudData = rows[0].data;
            } else console.error('Load failed:', resp.status, await resp.text());
        } catch(e) { console.error('Load exception:', e.message); }
    }

    let localData = null;
    for (const key of ['rocinante_v5_0', 'rocinante_v4_0', 'rocinante_v3_3', 'rocinante_v3_2', 'rocinante_v3_1']) {
        const raw = localStorage.getItem(key);
        if (raw) { try { localData = JSON.parse(raw); break; } catch(e) {} }
    }

    let best = cloudData || localData;
    if (cloudData && localData) {
        best = (localData.savedAt || 0) > (cloudData.savedAt || 0) ? localData : cloudData;
    }

    if (best) {
        try { applyData(best); } catch(e) { console.error('applyData error:', e); }
        localStorage.setItem('rocinante_v5_0', JSON.stringify(gatherData()));
        if (cloudData) { setSyncDot('synced'); setTimeout(() => setSyncDot(''), 3000); }
    } else {
        tasks = starterTasks();
        nextId = 7;
        renderKanban();
    
    }
}

function exportData() {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([JSON.stringify(gatherData())], { type: 'application/json' }));
    a.download = `rocinante_backup_${new Date().toISOString().slice(0, 10)}.json`;
    a.click();
}
function importData(e) {
    const file = e.target.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = ev => { localStorage.setItem('rocinante_v5_0', ev.target.result); location.reload(); };
    r.readAsText(file);
}
function clearCompleted() {
    if (!confirm('Clear all done tasks?')) return;
    tasks = tasks.filter(t => t.status !== 'done');
    renderKanban();

    save();
}
function toggleTheme() {
    const light = document.body.classList.toggle('light');
    localStorage.setItem('theme', light ? 'light' : 'dark');
    document.getElementById('theme-btn').textContent = light ? '☾ Dark' : '☀ Light';
}

// ── INIT ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); hideTagDropdown(); } });
document.addEventListener('click', e => {
    const bar = document.getElementById('kanban-add-bar');
    if (bar && !bar.contains(e.target)) hideTagDropdown();
});
if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');

window.onload = async () => {
    if (localStorage.getItem('theme') === 'light') {
        document.getElementById('theme-btn').textContent = '☾ Dark';
    }
    const { data: { session } } = await db.auth.getSession();
    if (session) {
        currentUser = session.user;
        currentToken = session.access_token;
        try { await initApp(); } catch(e) { appReady = false; showLogin(); console.error('initApp error:', e); }
    } else {
        showLogin();
    }
};
</script>
</body>
</html>
